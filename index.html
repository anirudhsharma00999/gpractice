<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <title>College Dashboard</title>
    <style>
        body { background: #f8f9fa; }
        .sidebar { background: #1d2b4f; min-height: 100vh; }
        .sidebar h3 { color: #fff; }
        .nav-link { color: rgba(255,255,255,0.85); }
        .nav-link:hover { color: #fff; }
        .card1 { background: #ffffff; }
        .card2 { background: #e9ecef; }
        .card3 { background: #f8f9fa; }
        .card4 { background: #ffffff; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h3 class="text-white">Dashboard</h3>

            <ul class="nav flex-column mt-4">
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Students</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Exams</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Results</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Settings</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>College Admin Dashboard</h2>

                <button class="btn btn-primary">
                    Logout
                </button>
            </div>

            <!-- Cards -->
            <div class="row g-4">

                <div class="col-md-3">
                    <div class="card shadow card1">
                        <div class="card-body">
                            <h5>Total Students</h5>
                            <h2>1200</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow card2">
                        <div class="card-body">
                            <h5>Total Teachers</h5>
                            <h2>85</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow card3">
                        <div class="card-body">
                            <h5>Exams Conducted</h5>
                            <h2>45</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow card4">
                        <div class="card-body">
                            <h5>Placements</h5>
                            <h2>320</h2>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
